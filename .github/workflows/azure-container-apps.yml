# CI/CD: Build images and push to Azure Container Registry on every push to main.
# After this runs, update running containers with the script in infra/azure/README.md
# or run manually in Azure Cloud Shell:
#   REG="unilib9ef41d.azurecr.io"; RG="unilib-rg"
#   for svc in user-service book-catalog-service loan-service notification-service api-gateway; do
#     az containerapp update --name "$svc" --resource-group "$RG" --image "$REG/$svc:latest" --output none
#   done
#   az containerapp update --name frontend --resource-group "$RG" --image "$REG/frontend:latest" --output none
#
# GitHub Secrets required (Settings → Secrets and variables → Actions):
#   ACR_LOGIN_SERVER       e.g. unilib9ef41d.azurecr.io
#   ACR_USERNAME           ACR admin username (from ACR → Access keys)
#   ACR_PASSWORD           ACR admin password (from ACR → Access keys)
#
# Optional:
#   GATEWAY_PUBLIC_ORIGIN  e.g. https://api-gateway-xxxxx.azurecontainerapps.io (no trailing slash)

name: Build and Push to Azure Container Registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/azure-container-apps.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push microservices
        env:
          REG: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA:0:7}"
          for svc in user-service book-catalog-service loan-service notification-service api-gateway; do
            echo ">>> Building $svc..."
            docker build -t "$REG/$svc:$TAG" -t "$REG/$svc:latest" "./services/$svc"
            docker push "$REG/$svc:$TAG"
            docker push "$REG/$svc:latest"
          done

      - name: Build and push frontend
        env:
          REG: ${{ secrets.ACR_LOGIN_SERVER }}
          ORIGIN: ${{ secrets.GATEWAY_PUBLIC_ORIGIN }}
        run: |
          set -euo pipefail
          if [ -z "${ORIGIN:-}" ]; then
            echo "GATEWAY_PUBLIC_ORIGIN not set — skipping frontend build."
            exit 0
          fi
          TAG="${GITHUB_SHA:0:7}"
          docker build -f frontend/Dockerfile.azure \
            --build-arg "VITE_API_GATEWAY_URL=${ORIGIN}/api" \
            --build-arg "VITE_NOTIFICATION_SOCKET_URL=${ORIGIN}" \
            -t "$REG/frontend:$TAG" -t "$REG/frontend:latest" ./frontend
          docker push "$REG/frontend:$TAG"
          docker push "$REG/frontend:latest"
          echo ">>> Frontend image pushed successfully!"
