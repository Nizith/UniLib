services:
  # MongoDB instance shared for local development
  mongodb:
    image: mongo:7
    container_name: unilib-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  user-service:
    build: ./services/user-service
    container_name: unilib-user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/unilib-users
      JWT_SECRET: unilib_dev_secret_key
    depends_on:
      - mongodb

  book-catalog-service:
    build: ./services/book-catalog-service
    container_name: unilib-book-catalog-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/unilib-books
      JWT_SECRET: unilib_dev_secret_key
    depends_on:
      - mongodb

  loan-service:
    build: ./services/loan-service
    container_name: unilib-loan-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/unilib-loans
      JWT_SECRET: unilib_dev_secret_key
      BOOK_SERVICE_URL: http://book-catalog-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      - mongodb
      - book-catalog-service
      - notification-service

  notification-service:
    build: ./services/notification-service
    container_name: unilib-notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/unilib-notifications
      JWT_SECRET: unilib_dev_secret_key
      LOAN_SERVICE_URL: http://loan-service:3003
      USER_SERVICE_URL: http://user-service:3001
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: unilib-frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - book-catalog-service
      - loan-service
      - notification-service

volumes:
  mongo-data:
