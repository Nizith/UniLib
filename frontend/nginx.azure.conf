# Production on Azure: the browser talks to the API gateway URL directly (HTTPS).
# VITE_API_GATEWAY_URL is set at build time to https://<gateway-fqdn>/api
# Socket.IO client uses VITE_NOTIFICATION_SOCKET_URL = https://<gateway-fqdn>
# So we only serve the SPA here — no /api or /socket.io proxy.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
